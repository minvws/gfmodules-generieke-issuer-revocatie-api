services:
  app:
    build:
      context: .
      args:
        NEW_UID: ${NEW_UID:-1000}
        NEW_GID: ${NEW_GID:-1000}
      dockerfile: docker/Dockerfile
    volumes:
      - ./:/src
      - ./secrets:/src/secrets
    ports:
      - "8525:8525"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8525/health"]
      start_period: 30s
      interval: 30m
    depends_on:
      - postgres
    networks:
      gfmodules:
        aliases:
          - revocation-service-app

  app_ssl:
    image: httpd
    restart: "no"
    ports:
      - "8542:443"
    volumes:
      - "./secrets:/usr/local/secrets"
      - "./docker/httpd.conf:/usr/local/apache2/conf/httpd.conf"
      - "./docker/httpd-ssl.conf:/usr/local/apache2/conf/extra/httpd-ssl.conf"
    depends_on:
      app:
        condition: service_healthy
    networks:
      gfmodules:
        aliases:
          - revocation-service-app

  postgres:
    image: postgres:15
    restart: "always"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
        - postgres_data:/var/lib/postgresql/data
    networks:
      gfmodules:
        aliases:
          - revocation-service-app


volumes:
    postgres_data:
        driver: local

networks:
    gfmodules:
        external: true
        driver: bridge
        name: gfmodules
